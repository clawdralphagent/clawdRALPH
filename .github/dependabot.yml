# Dependabot configuration for automated dependency updates

version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      # Group minor and patch updates for prod dependencies
      production-deps:
        patterns:
          - "@anthropic-ai/*"
          - "openai"
          - "grammy"
          - "discord.js"
          - "hono"
          - "ws"
          - "commander"
          - "zod"
        update-types:
          - "minor"
          - "patch"

      # Group dev dependencies
      dev-deps:
        patterns:
          - "@types/*"
          - "@typescript-eslint/*"
          - "@vitest/*"
          - "eslint*"
          - "prettier"
          - "typescript"
          - "vitest"
          - "tsx"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "automated"

  # Web dashboard dependencies
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      react-deps:
        patterns:
          - "react*"
          - "@types/react*"
        update-types:
          - "minor"
          - "patch"

      vite-deps:
        patterns:
          - "vite*"
          - "@vitejs/*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "web"
      - "automated"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
      - "automated"

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
      - "automated"
